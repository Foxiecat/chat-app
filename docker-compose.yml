services:
  database:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - ./Database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - chat-data:/var/lib/postgresql/data

volumes:
  chat-data:
